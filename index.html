<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Apero Plus - App Hub Premium</title>
  
  <!-- Google Fonts: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.5);
      --secondary: #a855f7;
      --bg-dark: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shine: rgba(255, 255, 255, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
    }

    /* Mesh Gradient Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: var(--bg-dark);
      overflow: hidden;
    }

    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      background: var(--primary);
      filter: blur(120px);
      border-radius: 50%;
      opacity: 0.2;
      animation: move 20s infinite alternate;
    }

    .blob-2 {
      background: var(--secondary);
      width: 400px;
      height: 400px;
      left: 60%;
      top: 20%;
      animation-duration: 15s;
      animation-delay: -5s;
    }

    @keyframes move {
      from { transform: translate(-10%, -10%) scale(1); }
      to { transform: translate(20%, 30%) scale(1.2); }
    }

    header {
      padding: 60px 20px 40px;
      text-align: center;
      position: relative;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 30%, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 1.1rem;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 30px;
    }

    /* Glassmorphic App Card */
    .app-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 32px;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .app-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--glass-shine), transparent);
      pointer-events: none;
    }

    .app-card:hover {
      transform: translateY(-8px);
      border-color: rgba(99, 102, 241, 0.3);
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5), 0 0 20px var(--primary-glow);
    }

    .app-icon-wrapper {
      width: 88px;
      height: 88px;
      margin: 0 auto 24px;
      position: relative;
    }

    .app-icon {
      width: 100%;
      height: 100%;
      border-radius: 22px;
      object-fit: cover;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      border: 1px solid var(--glass-border);
    }

    .platform-badge {
      align-self: center;
      padding: 6px 14px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 20px;
    }

    .platform-badge.android {
      background: rgba(61, 220, 132, 0.15);
      color: #3ddc84;
      border: 1px solid rgba(61, 220, 132, 0.2);
    }

    .platform-badge.ios {
      background: rgba(0, 122, 255, 0.15);
      color: #007aff;
      border: 1px solid rgba(0, 122, 255, 0.2);
    }

    .app-title {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      color: #fff;
    }

    .app-description {
      font-size: 0.95rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 24px;
      flex-grow: 1;
    }

    .tag-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 30px;
    }

    .tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-muted);
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 10px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-dev {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
      box-shadow: 0 4px 15px rgba(245, 158, 11, 0.2);
    }

    .btn-live {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
    }

    .btn-full {
      grid-column: span 2;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: #fff;
    }

    footer {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    footer p {
      margin-bottom: 8px;
    }

    /* Staggered Entrance */
    .app-card {
      opacity: 0;
      transform: translateY(20px);
      animation: appear 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    @keyframes appear {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      header { padding-top: 40px; }
      .container { grid-template-columns: 1fr; }
      .btn-group { grid-template-columns: 1fr; }
      .btn-full { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <div class="bg-animation">
    <div class="blob"></div>
    <div class="blob blob-2"></div>
  </div>

  <header>
    <h1>Apero Plus</h1>
    <p>Trung tâm phát hành ứng dụng nội bộ chuẩn Platinum</p>
  </header>

  <main>
    <div class="container" id="appContainer">
      <!-- Loading skeleton or empty state -->
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Apero Plus Engine. All rights reserved.</p>
    <p>Dành riêng cho mục đích kiểm thử nội bộ.</p>
  </footer>

  <script>
    const formatUrl = (url, isIOS) => {
      if (!url) return "";
      if (isIOS) return "itms-services://?action=download-manifest&url=" + encodeURIComponent(url);
      return url;
    };

    fetch("apps.json")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("appContainer");
        container.innerHTML = "";

        if (!data.apps || data.apps.length === 0) {
          container.innerHTML = '<div class="app-card" style="grid-column: 1/-1; text-align: center;">Chưa có ứng dụng nào được tải lên.</div>';
          return;
        }

        data.apps.forEach((app, index) => {
          const isIOS = (app.platform || "").toLowerCase().includes("ios");
          const tags = (app.features || []).map(t => `<span class="tag">${t}</span>`).join("");
          
          const devUrl = formatUrl(app.downloads?.dev, isIOS);
          const prodUrl = formatUrl(app.downloads?.prod, isIOS);
          const aabUrl = app.downloads?.aab || "";

          const card = document.createElement("article");
          card.className = "app-card";
          card.style.animationDelay = `${index * 0.1}s`;
          
          card.innerHTML = `
            <div class="app-icon-wrapper">
              <img src="${app.icon || 'https://via.placeholder.com/150'}" alt="${app.name}" class="app-icon" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(app.name)}&background=6366f1&color=fff'">
            </div>
            
            <span class="platform-badge ${isIOS ? 'ios' : 'android'}">${app.platform || 'Android'}</span>
            
            <h2 class="app-title">${app.name}</h2>
            <p class="app-description">${app.description || ''}</p>
            
            <div class="tag-container">${tags}</div>
            
            <div class="btn-group">
              ${devUrl ? `<a href="${devUrl}" class="btn btn-dev">🔧 Dev</a>` : ""}
              ${prodUrl ? `<a href="${prodUrl}" class="btn btn-live">🚀 Live</a>` : ""}
              ${aabUrl ? `<a href="${aabUrl}" class="btn btn-full">📦 Tải bộ cài AAB</a>` : ""}
            </div>
          `;
          
          container.appendChild(card);
        });
      })
      .catch(err => {
        console.error(err);
        document.getElementById("appContainer").innerHTML = '<div class="app-card" style="grid-column: 1/-1; color: #ef4444;">❌ Lỗi kết nối máy chủ.</div>';
      });
  </script>
</body>
</html>
