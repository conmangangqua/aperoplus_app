<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Apero+ Internal Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-surface: #1e293b;
      --bg-hover: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #10b981; /* Emerald */
      --accent-hover: #059669;
      --border-color: #334155;
      --font-ui: 'Inter', system-ui, -apple-system, sans-serif;
      --font-code: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      font-family: var(--font-ui); 
      background-color: var(--bg-dark); 
      color: var(--text-main); 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
    }

    /* Minimalist header */
    header { 
      padding: 40px 20px; 
      text-align: center; 
      border-bottom: 1px solid var(--border-color);
      background: rgba(15, 23, 42, 0.95);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { 
      font-family: var(--font-code);
      font-size: 1.5rem; 
      font-weight: 700; 
      letter-spacing: -0.02em; 
      color: var(--text-main);
    }
    header h1 span { color: var(--accent); }

    /* Compact Search */
    .search-section { 
      max-width: 800px; 
      margin: 30px auto 20px; 
      padding: 0 20px; 
      width: 100%;
    }
    .search-wrapper { 
      position: relative; 
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-surface);
      transition: border-color 0.2s;
    }
    .search-wrapper:focus-within {
      border-color: var(--accent);
    }
    .search-wrapper input { 
      width: 100%; 
      background: transparent; 
      border: none; 
      padding: 16px 20px 16px 50px; 
      color: var(--text-main); 
      font-size: 0.95rem; 
      outline: none; 
      font-family: var(--font-ui);
    }
    .search-wrapper::before { 
      content: '>'; 
      position: absolute; 
      left: 20px; 
      top: 50%; 
      transform: translateY(-50%); 
      font-size: 1.2rem; 
      color: var(--accent);
      font-family: var(--font-code);
      font-weight: 700;
    }

    main { 
      flex: 1; 
      width: 100%; 
      max-width: 1000px; 
      margin: 0 auto; 
      padding: 10px 20px 80px; 
    }
    
    /* List View Structure */
    #appContainer { 
      display: flex; 
      flex-direction: column; 
    }
    
    .list-header {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      gap: 20px;
      padding: 12px 24px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 2px solid var(--border-color);
      margin-bottom: 8px;
    }

    .app-row { 
      display: grid;
      grid-template-columns: 60px 1fr auto;
      gap: 20px;
      align-items: center;
      background: var(--bg-surface); 
      border: 1px solid var(--border-color); 
      border-radius: 8px; 
      padding: 16px 24px; 
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    .app-row:hover { 
      background: var(--bg-hover); 
      border-color: #475569;
      transform: translateX(4px);
    }

    .app-icon { 
      width: 50px; 
      height: 50px; 
      border-radius: 12px; 
      object-fit: cover; 
      background: #334155;
    }

    .app-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .app-title-group {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .app-title { 
      font-size: 1.1rem; 
      font-weight: 600; 
      color: var(--text-main); 
    }
    
    .badge { 
      font-size: 0.7rem; 
      font-weight: 700; 
      padding: 4px 8px; 
      border-radius: 4px; 
      text-transform: uppercase; 
      font-family: var(--font-code);
      background: #334155;
      color: #cbd5e1;
      border: 1px solid #475569;
    }

    .app-desc { 
      font-size: 0.85rem; 
      color: var(--text-muted); 
      font-weight: 400; 
    }

    .action-group { 
      display: flex; 
      gap: 10px; 
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn { 
      padding: 10px 16px; 
      border-radius: 6px; 
      font-weight: 500; 
      font-size: 0.85rem; 
      text-decoration: none; 
      text-align: center; 
      transition: 0.2s; 
      white-space: nowrap;
      font-family: var(--font-code);
    }
    
    .btn-dev { 
      background: transparent; 
      color: #fbbf24; /* Amber */
      border: 1px dashed #b45309; 
    }
    .btn-dev:hover { background: rgba(251, 191, 36, 0.1); border-style: solid; }
    
    .btn-live { 
      background: var(--accent); 
      color: #fff; 
      border: 1px solid var(--accent);
    }
    .btn-live:hover { background: var(--accent-hover); }

    .btn-full { 
      background: #334155; 
      color: var(--text-main); 
      border: 1px solid #475569; 
    }
    .btn-full:hover { background: #475569; }

    footer { 
      padding: 40px 20px; 
      text-align: center; 
      color: var(--text-muted); 
      font-size: 0.85rem; 
      border-top: 1px solid var(--border-color); 
      font-family: var(--font-code);
    }

    .empty-state {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
      font-family: var(--font-code);
      border: 1px dashed var(--border-color);
      border-radius: 8px;
    }

    @media (max-width: 768px) { 
      .list-header { display: none; }
      .app-row { 
        grid-template-columns: 1fr;
        gap: 16px;
        position: relative;
        padding-left: 80px;
      }
      .app-icon {
        position: absolute;
        top: 16px;
        left: 16px;
      }
      .action-group { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <h1>apero_plus <span>~/$</span></h1>
  </header>

  <section class="search-section">
    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="grep search_apps..." oninput="filterApps()">
    </div>
  </section>

  <main>
    <div class="list-header" id="listHeader">
      <div>ICON</div>
      <div>APPLICATION IDENTITY</div>
      <div style="text-align: right;">ACTIONS</div>
    </div>
    <div id="appContainer"></div>
  </main>

  <footer>
    <p>Apero+ Internal Registry // 0x2026</p>
  </footer>

  <script>
    let allApps = [];
    
    // Check for '?dev' in URL
    const urlParams = new URL(window.location.href).searchParams;
    const showDevBuilds = urlParams.has('dev');

    const formatUrl = (url, isIOS) => {
      if (!url) return "";
      if (isIOS) return "itms-services://?action=download-manifest&url=" + encodeURIComponent(url);
      return url;
    };

    const renderApps = (apps) => {
      const container = document.getElementById("appContainer");
      const header = document.getElementById("listHeader");
      container.innerHTML = "";
      
      if (apps.length === 0) { 
        header.style.display = 'none';
        container.innerHTML = '<div class="empty-state">[!] No applications matching current query.</div>'; 
        return; 
      }
      
      header.style.display = window.innerWidth > 768 ? 'grid' : 'none';

      apps.forEach((app) => {
        const isIOS = (app.platform || "").toLowerCase().includes("ios");
        const devUrl = formatUrl(app.downloads?.dev, isIOS);
        const prodUrl = formatUrl(app.downloads?.prod, isIOS);
        const aabUrl = app.downloads?.aab || "";

        const row = document.createElement("article");
        row.className = "app-row";
        
        row.innerHTML = `
          <img src="${app.icon || 'https://via.placeholder.com/150'}" class="app-icon" alt="${app.name}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(app.name)}&background=334155&color=fff'">
          
          <div class="app-info">
            <div class="app-title-group">
              <h2 class="app-title">${app.name}</h2>
              <span class="badge">${app.platform || 'ANDROID'}</span>
            </div>
            ${app.description ? `<p class="app-desc">${app.description}</p>` : ''}
          </div>
          
          <div class="action-group">
            ${(devUrl && showDevBuilds) ? `<a href="${devUrl}" class="btn btn-dev">dev_build</a>` : ""}
            ${prodUrl ? `<a href="${prodUrl}" class="btn btn-live">LIVE BUILD</a>` : ""}
            ${aabUrl ? `<a href="${aabUrl}" class="btn btn-full">AAB</a>` : ""}
          </div>
        `;
        container.appendChild(row);
      });
    };

    const filterApps = () => {
      const query = document.getElementById("searchInput").value.toLowerCase();
      renderApps(allApps.filter(app => 
        app.name.toLowerCase().includes(query) || 
        (app.description && app.description.toLowerCase().includes(query))
      ));
    };

    fetch("apps.json")
      .then(res => res.json())
      .then(data => { 
        allApps = data.apps || []; 
        renderApps(allApps); 
      })
      .catch(err => { 
        document.getElementById("listHeader").style.display = 'none';
        document.getElementById("appContainer").innerHTML = '<div class="empty-state" style="color: #ef4444;">[ERR] Connection refused or invalid database.</div>'; 
      });
  </script>
</body>
</html>
